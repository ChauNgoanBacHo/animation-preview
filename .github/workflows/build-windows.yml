name: Build Windows

on:
  push:
    tags:
      - 'v*'
    branches:
      - feat/besden
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run make:win

      - uses: actions/upload-artifact@v4
        with:
          name: animation-preview-windows
          path: |
            out/make/**/*.exe
          if-no-files-found: error
          retention-days: 5

      # Artifacts above always require a signed-in GitHub account to download.
      # Release assets on a public repo do not, so every build also lands in a
      # release: the tag itself for tags, a rolling "dev" prerelease otherwise.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Dev build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            out/make/**/*.exe
